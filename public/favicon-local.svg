<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient - Gray for localhost -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#555555" />
      <stop offset="100%" stop-color="#333333" />
    </linearGradient>
    
    <!-- Accent Gradient (Orange to Red-Pink, matching cognitive bridge design) -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded Box Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" stroke="#666666" stroke-width="12" />
  
  <!-- Outer Glow of the Brain -->
  <g filter="url(#glow)" transform="translate(112, 112) scale(12)">
    <!-- Stylized Brain Path -->
    <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" 
          fill="none" stroke="url(#accent-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" 
          fill="none" stroke="url(#accent-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M12 5v14" 
          fill="none" stroke="url(#accent-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
    <path d="M12 9h4a2 2 0 0 1 2 2v1" 
          fill="none" stroke="url(#accent-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M12 15h-4a2 2 0 0 1-2-2v-1" 
          fill="none" stroke="url(#accent-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M12 12h-4" 
          fill="none" stroke="url(#accent-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M12 12h4" 
          fill="none" stroke="url(#accent-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
